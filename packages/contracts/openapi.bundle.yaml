        - organizerId
        - status
        - title
        - description
        - category
        - startsAt
        - endsAt
        - deadlineAt
        - displayTimeZone
        - region
        - publicArea
        - capacity
        - confirmedCount
        - availableCapacity
        - fee
        - coverURL
        - tags
        - organizer
        - favorited
        - registrationStatus
        - viewerRegistration
        - registrationMode
        - waitlistEnabled
        - format
        - primaryLocale
        - supportedLocales
        - localeConfirmed
        - availableActions
        - version
        - updatedAt
      properties:
        id:
