limit_req_zone $binary_remote_addr zone=spott_preview_api:10m rate=12r/s;
limit_req_zone $binary_remote_addr zone=spott_preview_web:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=spott_preview_connections:10m;

# Public HTTP entry: FULL authenticated app, OPEN over plain HTTP for the TEST
# period only (test account + synthetic data). This mirrors the internal
# localhost:8080 full-app listener below: all methods are allowed, and the
# browser's Authorization / Cookie / BFF headers pass straight through to the
# API and web so login, create, studio, groups, shares and account all work.
#
# Login works over HTTP because the web client carries its session as a
# Bearer token in localStorage (no Secure session cookie is involved), the API
# runs with WEB_SESSION_BFF_ENFORCEMENT=off, and http://18.178.203.117 is in
# WEB_ORIGIN. See nginx-spott.readonly.conf for the LOCKDOWN VARIANT that must
# be restored before real users / once TLS is terminated in front of the edge.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 18.178.203.117 "";

    server_tokens off;
    client_max_body_size 20m;
    limit_conn spott_preview_connections 64;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
        application/xml application/xml+rss image/svg+xml;

    # No Strict-Transport-Security over plain HTTP. Keep the lightweight
    # hardening headers that are safe without TLS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /v1/ {
        limit_req zone=spott_preview_api burst=48 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host 18.178.203.117;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=spott_preview_web burst=50 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host 18.178.203.117;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
    }
}

# Internal functional-test entry. This listener is bound to loopback and is
# reachable only through an authenticated SSH local-forward tunnel.
server {
    listen 127.0.0.1:8080;
    server_name localhost 127.0.0.1;

    if ($http_host !~* ^(?:localhost|127\.0\.0\.1):8080$) {
        return 421;
    }

    server_tokens off;
    client_max_body_size 20m;

    add_header X-Spott-Preview-Mode "internal-test" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /v1/ {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Spott-Preview-Mode internal-test;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Spott-Preview-Mode internal-test;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
    }
}
