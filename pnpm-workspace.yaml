packages:
  - apps/*
  - services/*
  - packages/*

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true

catalog:
  typescript: ^6.0.0
  zod: ^4.0.5

onlyBuiltDependencies:
  - '@nestjs/core'
  - esbuild
  - sharp

# Keep native Vite/Rolldown bindings for both the Apple-silicon developer
# workstation and the Linux x64 production image in the immutable lockfile.
supportedArchitectures:
  os:
    - darwin
    - linux
  cpu:
    - arm64
    - x64
  libc:
    - glibc
