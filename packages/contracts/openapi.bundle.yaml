openapi: 3.1.0
info:
  title: Spott API
  version: 1.0.0
  description: Spott iOS/Web 单一契约。具备 Idempotency-Key 参数的副作用写入由调用方提供稳定幂等键； 媒体上传、完成、附件与举报均以调用方保留的 UUID 和服务端持久回执支持响应丢失恢复； 业务状态始终由服务端裁决。
  contact:
    name: Spott Engineering
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.spott.jp/v1
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Auth
    description: Identity, external login, sessions, and account lifecycle.
  - name: Profiles
    description: User profiles, social follows, and achievements.
  - name: Discovery
    description: Public event and group discovery surfaces.
  - name: Events
    description: Event authoring, publishing, search, and favorites.
  - name: Registrations
    description: Applications, waitlists, attendee review, and cancellation.
  - name: Attendance
    description: Dynamic, numeric, and manual check-in workflows.
  - name: Groups
    description: Persistent communities, memberships, announcements, and ownership.
  - name: Points
    description: Wallets, quotes, product catalogs, and StoreKit transactions.
  - name: Notifications
    description: Localized inbox, push devices, and delivery preferences.
  - name: Safety
    description: Reports, appeals, safety-case status, and blocking.
  - name: Sync
    description: Ordered cross-device incremental synchronization.
  - name: Ops
    description: Restricted operational moderation and configuration actions.
  - name: Analytics
    description: Privacy-aware product analytics ingestion.
  - name: Feedback
    description: Private post-event feedback and thresholded summaries.
  - name: Media
    description: Direct media uploads, processing, and attachment.
  - name: Growth
    description: Share links and generated promotional posters.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness and dependency status
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          $ref: '#/components/responses/Error'
  /auth/email/challenges:
    post:
      operationId: createEmailChallenge
      summary: Create email challenge
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - deviceId
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 254
                deviceId:
                  $ref: '#/components/schemas/UUID'
      responses:
        '202':
          $ref: '#/components/responses/ChallengeCreated'
        '429':
          $ref: '#/components/responses/Error'
  /auth/email/verify:
    post:
      operationId: verifyEmailChallenge
      summary: Verify email challenge
      tags:
        - Auth
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyChallengeRequest'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '400':
          $ref: '#/components/responses/Error'
  /auth/apple:
    post:
      operationId: authenticateWithApple
      summary: Authenticate with apple
      description: Validates SHA-256(raw nonce) and an exact platform-specific audience. iOS accepts only APPLE_BUNDLE_ID; Web accepts only APPLE_SERVICE_ID.
      tags:
        - Auth
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identityToken
                - nonce
                - deviceId
              properties:
                identityToken:
                  type: string
                nonce:
                  type: string
                  minLength: 32
                deviceId:
                  $ref: '#/components/schemas/UUID'
                platform:
                  type: string
                  enum:
                    - ios
                    - web
                  default: ios
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '401':
          $ref: '#/components/responses/Error'
  /auth/google:
    post:
      operationId: authenticateWithGoogle
      summary: Authenticate with google
      description: Verifies a Google ID token whose audience is the server-side OAuth Web application client ID configured by GOOGLE_SERVER_CLIENT_ID. Native iOS client IDs are not accepted as the production audience.
      tags:
        - Auth
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
                - deviceId
              properties:
                idToken:
                  type: string
                deviceId:
                  $ref: '#/components/schemas/UUID'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '401':
          $ref: '#/components/responses/Error'
  /auth/refresh:
    post:
      operationId: refreshSession
      summary: Refresh session
      description: Rotates the current refresh credential. Idempotency-Key and a persistent device binding proof are optional for compatibility only while the supplied credential is still current and being used for the first time; neither omission permits recovery of a consumed credential.
      tags:
        - Auth
      security: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Stable UUID for an independently retryable refresh attempt.
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
                - deviceId
              properties:
                refreshToken:
                  type: string
                deviceId:
                  $ref: '#/components/schemas/UUID'
                deviceBindingProof:
                  $ref: '#/components/schemas/PersistentDeviceBindingProof'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /auth/bootstrap:
    post:
      operationId: bootstrapSession
      summary: Bootstrap the current session without rotating it
      description: Returns a freshly signed access token for the same current stable session only after the refresh credential, device, immutable transport, current generation, current refresh history and active persistent binding all agree. This read-only operation never rotates or extends the refresh credential and never updates session, history or binding time fields.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - refreshToken
                - deviceId
                - deviceBindingProof
              properties:
                refreshToken:
                  type: string
                deviceId:
                  $ref: '#/components/schemas/UUID'
                deviceBindingProof:
                  $ref: '#/components/schemas/PersistentDeviceBindingProof'
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /sessions/{id}:
    delete:
      operationId: revokeSession
      summary: Revoke session
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Revoked
        '404':
          $ref: '#/components/responses/Error'
  /sessions:
    delete:
      operationId: revokeAllSessions
      summary: Revoke every session for the current account
      tags:
        - Auth
      responses:
        '200':
          description: All sessions revoked
        '401':
          $ref: '#/components/responses/Error'
  /phone/challenges:
    post:
      operationId: createPhoneChallenge
      summary: Create phone challenge
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phoneNumber
                - deviceId
              properties:
                phoneNumber:
                  type: string
                  pattern: ^\\+81[1-9][0-9]{8,9}$
                deviceId:
                  $ref: '#/components/schemas/UUID'
      responses:
        '202':
          $ref: '#/components/responses/ChallengeCreated'
        '429':
          $ref: '#/components/responses/Error'
  /phone/challenges/{id}/verify:
    post:
      operationId: verifyPhoneChallenge
      summary: Verify phone challenge
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  pattern: ^[0-9]{6}$
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                required:
                  - requestId
                  - verifiedAt
                  - reward
                properties:
                  requestId:
                    type: string
                  verifiedAt:
                    type: string
                    format: date-time
                  reward:
                    $ref: '#/components/schemas/WalletBalance'
        '409':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /accounts/merge/preview:
    post:
      operationId: previewAccountMerge
      summary: Preview account merge
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  $ref: '#/components/schemas/AccountMergeCredential'
      responses:
        '200':
          description: Merge impact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountMergePreview'
        '400':
          $ref: '#/components/responses/Error'
  /accounts/merge/commit:
    post:
      operationId: commitAccountMerge
      summary: Commit account merge
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jobId
                - mergeToken
                - deviceId
              properties:
                jobId:
                  $ref: '#/components/schemas/UUID'
                mergeToken:
                  type: string
                  minLength: 32
                  maxLength: 256
                  writeOnly: true
                deviceId:
                  $ref: '#/components/schemas/UUID'
                platform:
                  type: string
                  enum:
                    - ios
                    - web
                  default: web
      responses:
        '200':
          $ref: '#/components/responses/AuthSession'
        '409':
          $ref: '#/components/responses/Error'
  /accounts/deletion-request:
    post:
      operationId: requestAccountDeletion
      summary: Request account deletion
      tags:
        - Auth
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Cooling-off period started
          content:
            application/json:
              schema:
                type: object
                required:
                  - executeAfter
                properties:
                  executeAfter:
                    type: string
                    format: date-time
        '409':
          $ref: '#/components/responses/Error'
    delete:
      operationId: cancelAccountDeletion
      summary: Cancel an account deletion request during cooling off
      tags:
        - Auth
      responses:
        '200':
          description: Deletion request cancelled
        '409':
          $ref: '#/components/responses/Error'
  /analytics/events/batch:
    post:
      operationId: ingestAnalyticsEvents
      summary: Ingest a bounded analytics event batch
      tags:
        - Analytics
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - events
              properties:
                events:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items:
                    type: object
                    additionalProperties: true
      responses:
        '202':
          description: Batch accepted
        '400':
          $ref: '#/components/responses/Error'
  /me/profile:
    get:
      operationId: getMyProfile
      summary: Get my profile
      tags:
        - Profiles
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          $ref: '#/components/responses/Error'
    patch:
      operationId: updateMyProfile
      summary: Update my profile
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  minLength: 1
                  maxLength: 40
                bio:
                  type: string
                  maxLength: 500
                regionId:
                  type: string
                preferredLocale:
                  $ref: '#/components/schemas/Locale'
                contentLanguages:
                  type: array
                  minItems: 1
                  maxItems: 3
                  items:
                    $ref: '#/components/schemas/Locale'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '409':
          $ref: '#/components/responses/Error'
  /profiles/{id}:
    get:
      operationId: getPublicProfile
      summary: Get a public profile by user id or handle
      tags:
        - Profiles
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 80
          description: User UUID or public handle
      responses:
        '200':
          description: Public profile and viewer follow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          $ref: '#/components/responses/Error'
  /profiles/{id}/events:
    get:
      operationId: getPublicProfileEvents
      summary: List publicly visible events hosted by a user
      tags:
        - Profiles
        - Events
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 80
          description: User UUID or public handle
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Public organizer event page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileEventPage'
        '404':
          $ref: '#/components/responses/Error'
  /profiles/{id}/follow:
    put:
      operationId: followProfile
      summary: Reach the followed target state for an organizer
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Follow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowState'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      operationId: unfollowProfile
      summary: Reach the unfollowed target state for an organizer
      tags:
        - Profiles
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Follow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowState'
        '404':
          $ref: '#/components/responses/Error'
  /discovery/feed:
    get:
      operationId: getDiscoveryFeed
      summary: Get discovery feed
      tags:
        - Discovery
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
            maxLength: 120
        - name: region
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: startsAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: startsBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: availableOnly
          in: query
          schema:
            type: boolean
        - name: format
          in: query
          schema:
            type: string
            enum:
              - in_person
              - online
              - hybrid
        - name: language
          in: query
          schema:
            $ref: '#/components/schemas/Locale'
        - name: price
          in: query
          schema:
            type: string
            enum:
              - free
              - paid
        - name: bounds
          in: query
          description: west,south,east,north
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Personalised, module-grouped discovery feed with an optional operational banner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryFeed'
        '400':
          $ref: '#/components/responses/Error'
  /events/search:
    get:
      operationId: searchEvents
      summary: Search events
      tags:
        - Discovery
        - Events
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
            maxLength: 120
        - name: region
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: startsAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: startsBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: availableOnly
          in: query
          schema:
            type: boolean
        - name: format
          in: query
          schema:
            type: string
            enum:
              - in_person
              - online
              - hybrid
        - name: language
          in: query
          schema:
            $ref: '#/components/schemas/Locale'
        - name: price
          in: query
          schema:
            type: string
            enum:
              - free
              - paid
        - name: bounds
          in: query
          description: west,south,east,north
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Matching events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventPage'
        '400':
          $ref: '#/components/responses/Error'
  /events/{id}:
    get:
      operationId: getEvent
      summary: Get event
      tags:
        - Events
      security: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Permission-shaped event view
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      operationId: updateEvent
      summary: Update event
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/EventDraftInput'
      responses:
        '200':
          description: Updated event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '409':
          $ref: '#/components/responses/Error'
  /me/hosted-events:
    get:
      operationId: getMyHostedEvents
      summary: List events hosted by the current user
      tags:
        - Events
      responses:
        '200':
          description: Hosted events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventItems'
        '401':
          $ref: '#/components/responses/Error'
  /me/favorite-events:
    get:
      operationId: getMyFavoriteEvents
      summary: List the current user favorite events
      tags:
        - Events
      responses:
        '200':
          description: Favorite events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSummaryItems'
        '401':
          $ref: '#/components/responses/Error'
  /events/{id}/favorite:
    put:
      operationId: favoriteEvent
      summary: Favorite event
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Favorite target state reached
        '400':
          $ref: '#/components/responses/Error'
    delete:
      operationId: unfavoriteEvent
      summary: Unfavorite event
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Unfavorite target state reached
        '400':
          $ref: '#/components/responses/Error'
  /events/drafts:
    post:
      operationId: createEventDraft
      summary: Create event draft
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventDraftInput'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '400':
          $ref: '#/components/responses/Error'
  /events/{id}/submit:
    post:
      operationId: submitEvent
      summary: Submit event
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quoteId
              properties:
                quoteId:
                  $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '422':
          $ref: '#/components/responses/Error'
  /events/{id}/cancel:
    post:
      operationId: cancelEvent
      summary: Cancel event
      tags:
        - Events
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  minLength: 3
                  maxLength: 500
      responses:
        '200':
          description: Cancelled; side effects tracked by outbox
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
        '400':
          $ref: '#/components/responses/Error'
  /events/{id}/registrations:
    post:
      operationId: registerForEvent
      summary: Register for event
      tags:
        - Registrations
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partySize
                - quoteId
              properties:
                partySize:
                  type: integer
                  minimum: 1
                  maximum: 10
                quoteId:
                  $ref: '#/components/schemas/UUID'
                joinWaitlistIfFull:
                  type: boolean
                  default: false
                answers:
                  type: object
                  default: {}
                  description: Values keyed by RegistrationQuestion.id.
                  additionalProperties:
                    oneOf:
                      - type: string
                        maxLength: 1000
                      - type: boolean
                      - type: 'null'
                attendeeNote:
                  type: string
                  maxLength: 1000
      responses:
        '201':
          description: Authoritative registration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
        '409':
          $ref: '#/components/responses/Error'
  /events/{id}/attendees:
    get:
      operationId: getEventAttendees
      summary: List registration applications and answers for a host
      tags:
        - Registrations
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RegistrationStatus'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Host attendee review page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeePage'
        '403':
          $ref: '#/components/responses/Error'
