        - serverTime
        - queryExplanationId
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventSummary'
        nextCursor:
          type:
            - string
            - 'null'
        hasMore:
          type: boolean
        serverTime:
          type: string
          format: date-time
        queryExplanationId:
          type: string
    RecommendationScore:
      type: object
      description: Explainable score. `components` sums to `score`; safetyDemotion is negative.
      required:
        - score
        - boosted
        - components
      properties:
        score:
          type: number
        boosted:
          type: boolean
        components:
          type: object
          additionalProperties:
            type: number
    RecommendationItem:
      allOf:
        - $ref: '#/components/schemas/EventSummary'
        - type: object
          required:
            - recommendation
          properties:
            recommendation:
              $ref: '#/components/schemas/RecommendationScore'
    RecommendationModule:
      type: object
      required:
        - key
        - title
        - items
      properties:
        key:
          type: string
          enum:
            - today
            - weekend
            - nearby_hot
            - interest
            - new_events
            - verified_hosts
            - followed_updates
        title:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationItem'
    OperationalBanner:
      type: object
      description: At most one first-screen operational slot; always flagged promotional.
      required:
        - label
        - kind
        - promotional
        - event
      properties:
        label:
          type: string
          description: Compliance label, e.g. 推广/运营推荐.
        kind:
          type: string
          enum:
            - promoted
            - operational
        promotional:
          type: boolean
          const: true
        headline:
          type:
            - string
            - 'null'
        imageURL:
          type:
            - string
            - 'null'
          format: uri
        event:
          $ref: '#/components/schemas/EventSummary'
    DiscoveryFeed:
      type: object
      required:
        - banner
        - modules
        - moduleOrder
        - weights
        - scoringVersion
        - naturalResultsMinRatio
        - serverTime
        - generatedAt
        - queryExplanationId
      properties:
        banner:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/OperationalBanner'
        modules:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationModule'
        moduleOrder:
          type: array
          items:
            type: string
        weights:
          type: object
          additionalProperties:
            type: number
        scoringVersion:
          type: string
        naturalResultsMinRatio:
          type: number
        serverTime:
          type: string
          format: date-time
        generatedAt:
          type: string
          format: date-time
        queryExplanationId:
          type: string
    EventDraftInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 10000
        categoryId:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        deadlineAt:
          type: string
          format: date-time
        regionId:
          type: string
        publicArea:
          type: string
          maxLength: 120
        exactAddress:
          type: string
          maxLength: 500
        capacity:
          type: integer
          minimum: 2
          maximum: 500
        registrationMode:
          type: string
          enum:
            - automatic
            - approval
            - invite_only
        waitlistEnabled:
          type: boolean
        tags:
          type: array
          maxItems: 5
          items:
            type: string
            minLength: 1
            maxLength: 40
        attendeeRequirements:
          type: string
          maxLength: 2000
        riskFlags:
          type: array
          maxItems: 8
          items:
            type: string
            enum:
              - alcohol
              - late_night
              - family
              - minors
              - outdoor
              - mountain
              - water
              - high_fee
              - career
              - investment
              - gender_limited
        riskDetails:
          type: object
          additionalProperties:
            type: string
            maxLength: 1000
        groupId:
          type:
            - string
            - 'null'
          format: uuid
        checkinMode:
          type: string
          enum:
            - dynamic_qr
            - six_digit
            - manual
        commentPermission:
          type: string
          enum:
            - disabled
            - participants
            - group_members
        posterEnabled:
          type: boolean
        exactAddressVisibility:
          type: string
          enum:
            - public
            - confirmed
        format:
          type: string
          enum:
            - in_person
            - online
            - hybrid
        primaryLocale:
          $ref: '#/components/schemas/Locale'
        supportedLocales:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Locale'
        coordinate:
          type: object
          required:
            - latitude
            - longitude
          properties:
            latitude:
              type: number
              format: double
              minimum: -90
              maximum: 90
            longitude:
              type: number
              format: double
              minimum: -180
              maximum: 180
        fee:
          type: object
          additionalProperties: true
        registrationQuestions:
          type: array
          maxItems: 10
          items:
            type: object
            required:
              - prompt
            properties:
              id:
                $ref: '#/components/schemas/UUID'
              prompt:
                type: string
                minLength: 1
                maxLength: 240
              kind:
                type: string
                enum:
                  - text
                  - single_choice
                  - boolean
                default: text
              required:
                type: boolean
                default: false
              options:
                type: array
                maxItems: 12
                items:
                  type: string
                  minLength: 1
                  maxLength: 120
      dependentRequired:
        primaryLocale:
          - supportedLocales
        supportedLocales:
          - primaryLocale
      allOf:
        - if:
            required:
              - primaryLocale
            properties:
              primaryLocale:
                const: zh-Hans
          then:
            properties:
              supportedLocales:
                contains:
                  const: zh-Hans
        - if:
