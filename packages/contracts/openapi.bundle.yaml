    put:
      operationId: uploadMediaAttemptContent
      summary: Stream exact bytes through the capability-only Spott upload gateway
      description: Cookies and Authorization are forbidden. The capability binds this path, MIME, byte length, SHA-256, owner, asset, generation and expiry. The server enforces one total inbound deadline.
      tags:
        - Media
      security: []
      parameters:
        - name: attemptId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
        - name: X-Spott-Upload-Capability
          in: header
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 4096
          description: Opaque Spott gateway capability.
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            enum:
              - image/jpeg
              - image/png
              - image/webp
              - image/heic
        - name: Content-Length
          in: header
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 20971520
        - name: X-Content-SHA256
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/SHA256Input'
      requestBody:
        required: true
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
          image/png:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          image/heic:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Authoritative in-progress or committed gateway outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaGatewayUploadResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '408':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
        '415':
