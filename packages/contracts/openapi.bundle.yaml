        status:
          $ref: '#/components/schemas/EventStatus'
        title:
          type: string
        description:
          type: string
        category:
          type: string
        startsAt:
          type:
            - string
            - 'null'
          format: date-time
        endsAt:
          type:
            - string
            - 'null'
          format: date-time
        deadlineAt:
          type:
            - string
            - 'null'
          format: date-time
        displayTimeZone:
          type: string
