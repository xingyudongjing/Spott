          minLength: 1
          maxLength: 240
        kind:
          type: string
          enum:
            - text
            - single_choice
            - boolean
        required:
          type: boolean
        options:
          type: array
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 120
    EventMedia:
      type: object
      required:
