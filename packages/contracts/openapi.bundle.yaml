        updatedAt:
          type: string
          format: date-time
    EventSummary:
      allOf:
        - $ref: '#/components/schemas/EventSummaryBase'
        - type: object
          required:
            - coordinate
          properties:
            coordinate:
              description: Public discovery coordinates are approximate or null.
              oneOf:
                - type: 'null'
                - allOf:
                    - $ref: '#/components/schemas/EventCoordinate'
                    - type: object
                      properties:
                        precision:
                          type: string
                          const: approximate
    EventDetail:
      allOf:
        - $ref: '#/components/schemas/EventSummaryBase'
        - type: object
          required:
            - coordinate
            - exactAddress
            - attendeeRequirements
            - riskFlags
            - riskDetails
            - exactAddressVisibility
            - registrationQuestions
            - media
            - mediaCount
          properties:
            coordinate:
              description: Exact precision is returned only when the viewer may read the exact address; otherwise approximate or null.
              oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/EventCoordinate'
            exactAddress:
              type:
                - string
                - 'null'
              description: Null unless policy authorizes the viewer.
            attendeeRequirements:
              type:
                - string
                - 'null'
            riskFlags:
              type: array
              items:
                type: string
            riskDetails:
              type: object
              additionalProperties:
                type: string
            exactAddressVisibility:
              type: string
              enum:
                - public
                - confirmed
            registrationQuestions:
              type: array
              maxItems: 10
              items:
                $ref: '#/components/schemas/RegistrationQuestion'
            media:
              type: array
              maxItems: 6
              items:
                $ref: '#/components/schemas/EventMedia'
            mediaCount:
              type: integer
              minimum: 0
              maximum: 6
            groupId:
              type:
                - string
                - 'null'
              format: uuid
            checkinMode:
              type: string
              enum:
                - dynamic_qr
                - six_digit
                - manual
            commentPermission:
              type: string
              enum:
                - disabled
                - participants
                - group_members
            posterEnabled:
              type: boolean
    EventItems:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventDetail'
    EventSummaryItems:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventSummary'
    RegistrationQuestion:
      type: object
      required:
