          $ref: '#/components/schemas/UUID'
        status:
          type: string
          enum:
            - pending
            - confirmed
            - waitlisted
            - offered
            - checked_in
        partySize:
          type: integer
          minimum: 1
        offerExpiresAt:
          type:
            - string
            - 'null'
