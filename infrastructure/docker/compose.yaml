name: spott-local

services:
  postgres:
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_DB: spott
      POSTGRES_USER: spott
      POSTGRES_PASSWORD: spott
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spott -d spott"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-spott-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-spott-local-secret}
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-spott-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-spott-local-secret}
      S3_BUCKET: spott-media
    volumes:
      - ./minio-init.sh:/opt/spott/minio-init.sh:ro
      - ./minio-public-policy.json:/opt/spott/minio-public-policy.json:ro
    entrypoint: ["/bin/sh", "/opt/spott/minio-init.sh"]
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.27.7
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 2s
      timeout: 3s
      retries: 30

  clamav:
    image: clamav/clamav:1.4.3
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav

  migrate:
    build:
      context: ../..
      dockerfile: infrastructure/docker/worker.Dockerfile
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgres://spott:spott@postgres:5432/spott
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/worker.Dockerfile
    command: ["pnpm", "--filter", "@spott/worker", "start"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://spott:spott@postgres:5432/spott
      FIELD_ENCRYPTION_KEY_BASE64: ${FIELD_ENCRYPTION_KEY_BASE64:-c3BvdHQtbG9jYWwtZmllbGQta2V5LTMyLWJ5dGVzISE=}
      OBJECT_STORE_PROVIDER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ap-northeast-1
      S3_BUCKET: spott-media
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-spott-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-spott-local-secret}
      S3_FORCE_PATH_STYLE: "true"
      MEDIA_PUBLIC_ORIGIN: http://127.0.0.1:${MINIO_PORT:-9100}/spott-media
      MEDIA_SCAN_PROVIDER: clamav
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: Spott <notifications@spott.local>
      PUSH_PROVIDER: console
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
      clamav:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:
