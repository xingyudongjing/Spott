      summary: Approve or reject an export as a different operator
      tags:
        - Ops
      security:
        - OpsSession: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - decision
                - reason
              properties:
                decision:
                  type: string
                  enum:
                    - approve
                    - reject
                reason:
                  type: string
                  minLength: 3
                  maxLength: 2000
      responses:
        '200':
          description: Decided export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsExport'
        '409':
          $ref: '#/components/responses/Error'
  /ops/exports/{id}/download-ticket:
    get:
      operationId: getOpsExportDownloadTicket
      summary: Issue an audited five-minute download URL and consume one download allowance
      tags:
        - Ops
      security:
        - OpsSession: []
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
        - name: purpose
          in: query
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 1000
      responses:
        '200':
          description: Short-lived ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpsExportDownloadTicket'
        '409':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    OpsSession:
      type: apiKey
      in: cookie
      name: __Host-spott_ops
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        oneOf:
          - $ref: '#/components/schemas/UUID'
          - type: string
            maxLength: 100
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/UUID'
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
        pattern: ^"[1-9][0-9]*"$
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Limit500:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 500
  responses:
    Error:
      description: Stable business error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ChallengeCreated:
      description: Challenge accepted without revealing account existence
      content:
        application/json:
          schema:
            type: object
            required:
              - challengeId
              - expiresAt
              - retryAfterSeconds
            properties:
              challengeId:
                $ref: '#/components/schemas/UUID'
              expiresAt:
                type: string
                format: date-time
              retryAfterSeconds:
                type: integer
                minimum: 0
    AuthSession:
      description: Rotated device-bound session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthSession'
  schemas:
    UUID:
      type: string
      format: uuid
    Locale:
      type: string
      enum:
        - zh-Hans
        - ja
        - en
    FollowState:
      type: object
      required:
        - targetUserId
        - following
      properties:
        targetUserId:
          $ref: '#/components/schemas/UUID'
        following:
          type: boolean
    RegistrationStatus:
      type: string
      enum:
        - pending
        - confirmed
        - waitlisted
        - offered
        - checked_in
        - cancelled
        - rejected
        - expired
        - no_show
        - correction_pending
        - attendance_disputed
        - event_cancelled
        - final
    HealthResponse:
      type: object
      required:
        - status
        - version
        - requestId
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        version:
          type: string
        requestId:
          type: string
        dependencies:
          type: object
          additionalProperties:
            type: string
    VerifyChallengeRequest:
      type: object
      required:
        - challengeId
        - code
        - deviceId
      properties:
        challengeId:
          $ref: '#/components/schemas/UUID'
        code:
          type: string
          pattern: ^[0-9]{6}$
        deviceId:
          $ref: '#/components/schemas/UUID'
    PersistentDeviceBindingProof:
      type: object
      additionalProperties: false
      required:
        - bindingId
        - generation
        - proof
        - proofClass
      properties:
        bindingId:
          $ref: '#/components/schemas/UUID'
        generation:
          type: integer
          minimum: 0
        proof:
          type: string
          minLength: 32
          maxLength: 1024
          writeOnly: true
        proofClass:
          type: string
          enum:
            - persistent
    AuthSession:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshGeneration
        - sessionId
        - user
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshGeneration:
          type: integer
          minimum: 0
        sessionId:
          $ref: '#/components/schemas/UUID'
        user:
          type: object
          required:
            - id
            - publicHandle
            - phoneVerified
            - restrictions
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            publicHandle:
              type: string
            phoneVerified:
              type: boolean
            restrictions:
              type: array
              items:
                type: string
    AccountMergeCredential:
      oneOf:
        - type: object
          required:
            - provider
            - identityToken
            - nonce
          properties:
            provider:
              type: string
              const: apple
            identityToken:
              type: string
            nonce:
              type: string
              minLength: 32
              maxLength: 512
            platform:
              type: string
              enum:
                - ios
                - web
              default: ios
        - type: object
          required:
            - provider
            - idToken
          properties:
            provider:
              type: string
              const: google
            idToken:
              type: string
        - type: object
          required:
            - provider
            - challengeId
            - code
          properties:
            provider:
              type: string
              const: email
            challengeId:
              $ref: '#/components/schemas/UUID'
            code:
              type: string
              pattern: ^[0-9]{6}$
      discriminator:
        propertyName: provider
    AccountMergePreview:
      type: object
      required:
        - jobId
        - mergeToken
        - expiresAt
        - sourceUserId
        - targetUserId
        - impact
        - conflicts
        - canCommit
        - requiresSecondVerification
      properties:
        jobId:
          $ref: '#/components/schemas/UUID'
        mergeToken:
          type: string
          minLength: 43
          maxLength: 43
          description: One-time proof returned only after the second identity is verified.
        expiresAt:
          type: string
          format: date-time
        sourceUserId:
          $ref: '#/components/schemas/UUID'
        targetUserId:
          $ref: '#/components/schemas/UUID'
        impact:
          type: object
          additionalProperties: true
        conflicts:
          type: array
          items:
            type: string
            enum:
              - phoneBinding
              - eventRegistration
              - groupMembership
              - operatorAccount
        canCommit:
          type: boolean
        requiresSecondVerification:
          type: boolean
          const: false
    Profile:
      type: object
      required:
        - userId
        - nickname
        - bio
        - preferredLocale
        - contentLanguages
        - version
        - updatedAt
      properties:
        userId:
          $ref: '#/components/schemas/UUID'
        nickname:
          type: string
        bio:
          type: string
        regionId:
          type:
            - string
            - 'null'
        avatarURL:
          type:
            - string
            - 'null'
          format: uri
        preferredLocale:
          $ref: '#/components/schemas/Locale'
        contentLanguages:
          type: array
          minItems: 1
          maxItems: 3
          items:
            $ref: '#/components/schemas/Locale'
        publicHandle:
          type: string
        followerCount:
          type: integer
          minimum: 0
        viewerFollowing:
          type: boolean
        version:
          type: integer
          format: int64
          minimum: 1
        updatedAt:
          type: string
          format: date-time
    PublicProfileEvent:
      type: object
      required:
        - id
        - publicSlug
        - status
        - title
        - startsAt
        - endsAt
        - region
        - publicArea
        - priceLabel
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        publicSlug:
          type: string
        status:
          type: string
          enum:
            - published
            - registration_closed
            - in_progress
            - ended
            - archived
        title:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        region:
          type: string
        publicArea:
          type: string
        priceLabel:
          type: string
        coverURL:
          type:
            - string
            - 'null'
          format: uri
    PublicProfileEventPage:
      type: object
      required:
        - items
        - hasMore
        - nextCursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PublicProfileEvent'
        hasMore:
          type: boolean
        nextCursor:
          type:
            - string
            - 'null'
    EventCoordinate:
      type: object
      required:
        - latitude
        - longitude
        - precision
      properties:
        latitude:
