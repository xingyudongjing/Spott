name: Nightly quality drills

"on":
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24.18.0"
  PNPM_VERSION: "11.5.2"

jobs:
  nightly_load_concurrency:
    name: nightly-load-concurrency
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis@sha256:05d68c7f0f19b9aa0bf7c4a2049b2e8b38b44a63116392b95726a4c913766cf6
        env:
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "127.0.0.1:5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Select locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: false
      - name: Verify immutable toolchain inputs
        run: >-
          node scripts/ci/verify-toolchain-lock.mjs
          --lock ci/toolchain-lock.json
          --schema ci/toolchain-lock.schema.json
          --repo-root .
      - name: Install the frozen workspace
        run: |
          set -euo pipefail
          corepack enable
          corepack install --global "pnpm@${PNPM_VERSION}"
          corepack pnpm install --frozen-lockfile
      - name: Download and run locked load tooling
        run: |
          set -euo pipefail
          test -f tests/load/registration-last-seat.js
          test -f tests/load/discovery-read.js
          mkdir "$RUNNER_TEMP/spott-k6"
          scripts/ci/download-verified-tool.sh \
            --url "$(node -p 'require("./ci/toolchain-lock.json").downloads.k6.url')" \
            --sha256 "$(node -p 'require("./ci/toolchain-lock.json").downloads.k6.sha256')" \
            --bytes "$(node -p 'require("./ci/toolchain-lock.json").downloads.k6.bytes')" \
            --archive-format tar.gz \
            --destination "$RUNNER_TEMP/spott-k6"
          K6_BINARY="$RUNNER_TEMP/spott-k6/k6-v2.0.0-linux-amd64/k6"
          test -x "$K6_BINARY"
          "$K6_BINARY" version
          "$K6_BINARY" run tests/load/registration-last-seat.js
          "$K6_BINARY" run tests/load/discovery-read.js
      - name: Create scheduled evidence
        if: ${{ always() }}
        env:
          SPOTT_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir evidence
          node scripts/ci/create-evidence-artifact.mjs --check nightly-load-concurrency --output-directory evidence/nightly-load-concurrency --status "$SPOTT_JOB_STATUS"
      - name: Upload scheduled evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-load-concurrency
          path: |
            evidence/nightly-load-concurrency/report.json
            evidence/nightly-load-concurrency/artifact-manifest.sha256
          if-no-files-found: error
          retention-days: 14

  nightly_accessibility_performance:
    name: nightly-accessibility-performance
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    services:
      postgres:
        image: postgis/postgis@sha256:05d68c7f0f19b9aa0bf7c4a2049b2e8b38b44a63116392b95726a4c913766cf6
        env:
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "127.0.0.1:5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Select locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: false
      - name: Verify immutable toolchain inputs
        run: >-
          node scripts/ci/verify-toolchain-lock.mjs
          --lock ci/toolchain-lock.json
          --schema ci/toolchain-lock.schema.json
          --repo-root .
      - name: Install the frozen workspace
        run: |
          set -euo pipefail
          corepack enable
          corepack install --global "pnpm@${PNPM_VERSION}"
          corepack pnpm install --frozen-lockfile
      - name: Run locked accessibility and performance suites
        run: |
          set -euo pipefail
          test -f tests/e2e/accessibility.spec.ts
          test -f tests/performance/web-budget.spec.ts
          test -f tests/performance/api-budget.spec.ts
          docker run --rm --network host \
            --volume "$GITHUB_WORKSPACE:/work" \
            --workdir /work \
            --env CI=true \
            --env PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            mcr.microsoft.com/playwright@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48 \
            bash -euo pipefail -c '
              test "$(node --version)" = "v24.18.0"
              corepack enable
              test "$(corepack pnpm --version)" = "11.5.2"
              corepack pnpm test:e2e
            '
      - name: Create scheduled evidence
        if: ${{ always() }}
        env:
          SPOTT_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir evidence
          node scripts/ci/create-evidence-artifact.mjs --check nightly-accessibility-performance --output-directory evidence/nightly-accessibility-performance --status "$SPOTT_JOB_STATUS"
      - name: Upload scheduled evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-accessibility-performance
          path: |
            evidence/nightly-accessibility-performance/report.json
            evidence/nightly-accessibility-performance/artifact-manifest.sha256
          if-no-files-found: error
          retention-days: 14

  nightly_backup_restore:
    name: nightly-backup-restore
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis@sha256:05d68c7f0f19b9aa0bf7c4a2049b2e8b38b44a63116392b95726a4c913766cf6
        env:
          POSTGRES_DB: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - "127.0.0.1:5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SPOTT_CI_ADMIN_DATABASE_URL: postgres://postgres@127.0.0.1:5432/postgres
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Select locked Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: false
      - name: Verify immutable toolchain inputs
        run: >-
          node scripts/ci/verify-toolchain-lock.mjs
          --lock ci/toolchain-lock.json
          --schema ci/toolchain-lock.schema.json
          --repo-root .
      - name: Install the frozen workspace
        run: |
          set -euo pipefail
          corepack enable
          corepack install --global "pnpm@${PNPM_VERSION}"
          corepack pnpm install --frozen-lockfile
      - name: Run the marked backup and restore drill
        run: |
          set -euo pipefail
          test -x scripts/ci/backup-restore-drill.sh
          scripts/ci/backup-restore-drill.sh
      - name: Create scheduled evidence
        if: ${{ always() }}
        env:
          SPOTT_JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir evidence
          node scripts/ci/create-evidence-artifact.mjs --check nightly-backup-restore --output-directory evidence/nightly-backup-restore --status "$SPOTT_JOB_STATUS"
      - name: Upload scheduled evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-backup-restore
          path: |
            evidence/nightly-backup-restore/report.json
            evidence/nightly-backup-restore/artifact-manifest.sha256
          if-no-files-found: error
          retention-days: 14
