        - state
        - moderationState
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        assetId:
          $ref: '#/components/schemas/UUID'
        sortOrder:
          type: integer
          minimum: 0
          maximum: 5
        state:
          type: string
        moderationState:
          type: string
        url:
