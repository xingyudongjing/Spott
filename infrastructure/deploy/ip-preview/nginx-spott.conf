limit_req_zone $binary_remote_addr zone=spott_preview_api:10m rate=12r/s;
limit_req_zone $binary_remote_addr zone=spott_preview_web:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=spott_preview_connections:10m;

# Public SSR receives only the locale preference. Session, identity and BFF
# cookies never cross the anonymous HTTP boundary.
map $http_cookie $spott_public_locale_cookie {
    default "";
    "~*(?:^|;\s*)spott_locale=([^;]*)" "spott_locale=$1";
}

# Public HTTP entry: anonymous and read-only until a controlled domain and TLS
# are available. Credentials and debug authority are removed at the boundary.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 18.178.203.117 "";

    server_tokens off;
    client_max_body_size 1m;
    limit_conn spott_preview_connections 24;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
        application/xml application/xml+rss image/svg+xml;

    add_header X-Spott-Preview-Mode "read-only" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ^~ /v1/ops {
        return 404;
    }

    location ^~ /v1/auth {
        return 404;
    }

    # Share resolution records attribution even on GET. Keep both the direct
    # API and its SSR short-link wrapper outside the anonymous read-only edge.
    location ^~ /v1/shares/ {
        return 404;
    }

    location ^~ /s/ {
        return 404;
    }

    location ~ ^/(?:login|create|phone-verification|register(?:/|$)|reports/new(?:/|$)|studio(?:/|$)|me(?:/|$)|notifications(?:/|$)|groups/create(?:/|$)) {
        return 302 /discover?preview=readonly;
    }

    location /v1/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        limit_req zone=spott_preview_api burst=24 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host 18.178.203.117;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Spott-User-Id "";
        proxy_set_header X-Spott-Role "";
        proxy_set_header X-Spott-Phone-Verified "";
        proxy_set_header X-Spott-Device-Id "";
        proxy_set_header X-Spott-BFF-Version "";
        proxy_set_header X-Spott-BFF-Kid "";
        proxy_set_header X-Spott-BFF-Timestamp "";
        proxy_set_header X-Spott-BFF-Nonce "";
        proxy_set_header X-Spott-BFF-Signature "";
        proxy_hide_header Set-Cookie;
        proxy_connect_timeout 3s;
        proxy_read_timeout 20s;
    }

    location / {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
            return 405;
        }

        limit_req zone=spott_preview_web burst=50 nodelay;
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host 18.178.203.117;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
        proxy_set_header Cookie $spott_public_locale_cookie;
        proxy_set_header X-Spott-BFF-Version "";
        proxy_set_header X-Spott-BFF-Kid "";
        proxy_set_header X-Spott-BFF-Timestamp "";
        proxy_set_header X-Spott-BFF-Nonce "";
        proxy_set_header X-Spott-BFF-Signature "";
        proxy_set_header X-Spott-Preview-Mode read-only;
        proxy_hide_header Set-Cookie;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }

    location ~ /\. {
        deny all;
    }
}

# Internal functional-test entry. This listener is bound to loopback and is
# reachable only through an authenticated SSH local-forward tunnel.
server {
    listen 127.0.0.1:8080;
    server_name localhost 127.0.0.1;

    if ($http_host !~* ^(?:localhost|127\.0\.0\.1):8080$) {
        return 421;
    }

    server_tokens off;
    client_max_body_size 20m;

    add_header X-Spott-Preview-Mode "internal-test" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /v1/ {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:4100;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Spott-Preview-Mode internal-test;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Spott-Preview-Mode internal-test;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
    }
}
